{% extends 'admin/base_admin.html' %}
{% block title %}Edit User – Admin – BSPHCL{% endblock %}

{% block content %}

<div class="ptitle">
  <h2>Edit User – {{ user.name }}</h2>
  <span class="bc">
    <a href="{{ url_for('admin.admin_dashboard') }}">Dashboard</a> &rsaquo;
    <a href="{{ url_for('admin.manage_users') }}">Manage Users</a> &rsaquo;
    Edit User
  </span>
</div>

<div class="card" style="max-width:540px;">
  <div class="ch">Edit User Details &mdash; {{ user.consumer_id }}</div>
  <div class="cb">

    <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}">

      <div class="fg">
        <label for="name">Full Name <span class="req">*</span></label>
        <input type="text" id="name" name="name" class="fc" value="{{ user.name }}" required>
      </div>

      <div class="fg">
        <label for="email">Email Address <span class="req">*</span></label>
        <input type="email" id="email" name="email" class="fc" value="{{ user.email }}" required>
      </div>

      <div class="fg">
        <label for="mobile">Mobile Number <span class="req">*</span></label>
        <input type="tel" id="mobile" name="mobile" class="fc" value="{{ user.mobile }}" maxlength="10" required>
      </div>

      <div class="fg">
        <label for="role">Role <span class="req">*</span></label>
        <select id="role" name="role" class="fc" required>
          <option value="user"  {% if user.role == 'user' %}selected{% endif %}>User (Consumer)</option>
          <option value="staff" {% if user.role == 'staff' %}selected{% endif %}>Staff</option>
          <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>

      <hr class="divider">
      <div class="flex gap8">
        <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline btn-sm">Cancel</a>
      </div>

    </form>

  </div>
</div>

{% endblock %}
