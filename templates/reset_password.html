{% extends 'base.html' %}
{% block title %}Reset Password – BSPHCL{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-hdr">
      <h3>&#128274; Reset Password</h3>
      <p>Set a new password for your account</p>
    </div>

    <div class="auth-body">

      <form method="POST" action="{{ url_for('main_bp.reset_password') }}">
        <div class="fg">
          <label for="new_password">New Password <span class="req">*</span></label>
          <div class="pw-wrap">
            <input type="password" id="new_password" name="new_password" class="fc"
                   placeholder="Enter new password (min 6 chars)" required autofocus>
            <button type="button" class="pw-toggle" onclick="togglePw('new_password', this)"
                    title="Show password">&#128065;</button>
          </div>
        </div>
        <div class="fg">
          <label for="confirm_password">Confirm New Password <span class="req">*</span></label>
          <div class="pw-wrap">
            <input type="password" id="confirm_password" name="confirm_password" class="fc"
                   placeholder="Re-enter new password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('confirm_password', this)"
                    title="Show password">&#128065;</button>
          </div>
        </div>
        <div class="fg mt12">
          <button type="submit" class="btn btn-primary w100">Update Password</button>
        </div>
      </form>

    </div>

    <div class="auth-foot">
      <a href="{{ url_for('main_bp.login') }}">&larr; Back to Login</a>
    </div>

  </div>
</div>

<style>
.pw-wrap { position: relative; display: flex; align-items: center; }
.pw-wrap .fc { padding-right: 38px; }
.pw-toggle {
  position: absolute; right: 8px;
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--text-muted); padding: 0; line-height: 1;
}
.pw-toggle:hover { color: var(--primary); }
</style>

{% endblock %}

{% block extra_scripts %}
<script>
function togglePw(fieldId, btn) {
  var inp = document.getElementById(fieldId);
  if (inp.type === 'password') {
    inp.type = 'text'; btn.style.color = 'var(--primary)'; btn.title = 'Hide password';
  } else {
    inp.type = 'password'; btn.style.color = 'var(--text-muted)'; btn.title = 'Show password';
  }
}
</script>
{% endblock %}
